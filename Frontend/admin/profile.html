<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile</title>
</head>
<body>

<div id="profile-container">

    <!-- Sidebar -->

    <aside id="sidebar">

        <div id="logo-section">
            <h2 id="library-logo">📚 Digital Library</h2>
        </div>

        <nav id="sidebar-menu">

            <ul id="menu-list">

                <li id="menu-dashboard">
                    <a href="dashboard.html">Dashboard</a>
                </li>

                <li id="menu-book-catalog">
                    <a href="book-catalog.html">Book Catalog</a>
                </li>

                <li id="menu-access-requests">
                    <a href="access-requests.html">Access Requests</a>
                </li>

                <li id="menu-active-readers">
                    <a href="active-readers.html">Active Readers</a>
                </li>

                <li id="menu-members">
                    <a href="members.html">Members</a>
                </li>

                <li id="menu-categories">
                    <a href="categories.html">Categories</a>
                </li>

                <li id="menu-profile">
                    <a href="profile.html">Profile</a>
                </li>

                <li id="menu-logout">
                    <a href="../index.html">Logout</a>
                </li>

            </ul>

        </nav>

    </aside>

    <!-- Main Content -->

    <main id="main-content">

        <div id="profile-page">

            <!-- Page Header -->

            <header id="profile-header">

                <h1 id="profile-title">
                    Admin Profile
                </h1>

                <p id="profile-description">
                    View and update your profile information.
                </p>

            </header>

            <!-- Profile Picture -->

            <section id="profile-picture-section">

                <img
                    id="profile-image"
                    src="../images/admin.png"
                    alt="Admin Profile">

                <br>

                <input
                    type="file"
                    id="upload-profile-image"
                    accept="image/*">

            </section>

            <!-- Profile Information -->

            <section id="profile-information">

                <form id="profile-form">

                    <label for="admin-name">
                        Full Name
                    </label>

                    <input
                        type="text"
                        id="admin-name"
                        name="adminName"
                        placeholder="Enter Full Name">

                    <br><br>

                    <label for="admin-email">
                        Email
                    </label>

                    <input
                        type="email"
                        id="admin-email"
                        name="adminEmail"
                        placeholder="Enter Email">

                    <br><br>

                    <label for="admin-phone">
                        Phone Number
                    </label>

                    <input
                        type="tel"
                        id="admin-phone"
                        name="adminPhone"
                        placeholder="Enter Phone Number">

                    <br><br>

                    <button
                        type="submit"
                        id="update-profile-btn">

                        Update Profile

                    </button>

                </form>

            </section>

            <!-- Change Password -->

            <section id="password-section">

                <h2 id="password-title">
                    Change Password
                </h2>

                <form id="password-form">

                    <label for="current-password">
                        Current Password
                    </label>

                    <input
                        type="password"
                        id="current-password"
                        name="currentPassword">

                    <br><br>

                    <label for="new-password">
                        New Password
                    </label>

                    <input
                        type="password"
                        id="new-password"
                        name="newPassword">

                    <br><br>

                    <label for="confirm-password">
                        Confirm Password
                    </label>

                    <input
                        type="password"
                        id="confirm-password"
                        name="confirmPassword">

                    <br><br>

                    <button
                        type="submit"
                        id="change-password-btn">

                        Change Password

                    </button>

                </form>

            </section>

            <!-- Logout -->

            <section id="logout-section">

                <a href="../index.html">

                    <button id="logout-btn">

                        Logout

                    </button>

                </a>

            </section>

        </div>

    </main>

</div>

</body>
</html>
