<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Profile</title>
    <style>
        /* --- Reset & Base Styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            min-height: 100vh;
        }

        /* --- Layout Container --- */
        #profile-container {
            display: flex;
            min-height: 100vh;
        }

        /* --- Sidebar Navigation --- */
        #sidebar {
            width: 260px;
            background-color: #1e293b;
            color: #fff;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        #logo-section {
            padding: 24px;
            border-bottom: 1px solid #334155;
            text-align: center;
        }

        #library-logo {
            font-size: 1.3rem;
            font-weight: 600;
            color: #38bdf8;
        }

        #sidebar-menu {
            flex: 1;
            padding: 20px 0;
        }

        #menu-list {
            list-style: none;
        }

        #menu-list li a {
            display: block;
            padding: 12px 24px;
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        #menu-list li a:hover, 
        #menu-profile a {
            background-color: #334155;
            color: #fff;
            border-left: 4px solid #38bdf8;
        }

        #menu-logout a {
            color: #f87171;
            margin-top: 20px;
            border-top: 1px solid #334155;
            padding-top: 20px;
        }

        #menu-logout a:hover {
            background-color: #451a03;
            color: #ef4444;
            border-left: 4px solid #ef4444;
        }

        /* --- Main Content Area --- */
        #main-content {
            margin-left: 260px;
            flex: 1;
            padding: 40px;
            background-color: #f8fafc;
        }

        #profile-page {
            max-width: 800px;
            margin: 0 auto;
        }

        /* --- Header --- */
        #profile-header {
            margin-bottom: 32px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 16px;
        }

        #profile-title {
            font-size: 2rem;
            color: #0f172a;
            margin-bottom: 6px;
        }

        #profile-description {
            color: #64748b;
            font-size: 1rem;
        }

        /* --- Common Section Card Styling --- */
        section {
            background: #fff;
            padding: 28px;
            border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            margin-bottom: 28px;
        }

        h2 {
            font-size: 1.25rem;
            color: #1e293b;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 1px solid #f1f5f9;
        }

        /* --- Form Elements Styling --- */
        form {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.95rem;
            color: #334155;
            background-color: #f8fafc;
            transition: all 0.2s ease;
            margin-bottom: 20px; /* Replaces ugly <br> spaces */
        }

        input:focus {
            outline: none;
            border-color: #38bdf8;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }

        /* --- Buttons --- */
        button {
            cursor: pointer;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 6px;
            border: none;
            transition: all 0.2s ease;
            align-self: flex-start;
        }

        #update-profile-btn, 
        #change-password-btn {
            background-color: #0284c7;
            color: #fff;
        }

        #update-profile-btn:hover, 
        #change-password-btn:hover {
            background-color: #0369a1;
        }

        /* --- Profile Picture Section Layout --- */
        #profile-picture-section {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        #profile-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #e2e8f0;
            background-color: #e2e8f0;
        }

        input[type="file"] {
            font-size: 0.9rem;
            color: #64748b;
        }

        /* --- Logout Section Layout --- */
        #logout-section {
            background: transparent;
            padding: 0;
            box-shadow: none;
            display: flex;
            justify-content: flex-end;
        }

        #logout-btn {
            background-color: #ef4444;
            color: white;
        }

        #logout-btn:hover {
            background-color: #dc2626;
        }

        /* --- Responsive Design Breakdown --- */
        @media (max-width: 768px) {
            #profile-container {
                flex-direction: column;
            }

            #sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }

            #main-content {
                margin-left: 0;
                padding: 20px;
            }

            #profile-picture-section {
                flex-direction: column;
                text-align: center;
            }

            button {
                width: 100%;
                align-self: center;
            }
        }
    </style>
</head>
<body>

<div id="profile-container">

    <aside id="sidebar">

        <div id="logo-section">
            <h2 id="library-logo">📚 Digital Library</h2>
        </div>

        <nav id="sidebar-menu">
            <ul id="menu-list">
                <li id="menu-dashboard"><a href="dashboard.html">Dashboard</a></li>
                <li id="menu-book-catalog"><a href="book-catalog.html">Book Catalog</a></li>
                <li id="menu-access-requests"><a href="access-requests.html">Access Requests</a></li>
                <li id="menu-active-readers"><a href="active-readers.html">Active Readers</a></li>
                <li id="menu-members"><a href="members.html">Members</a></li>
                <li id="menu-categories"><a href="categories.html">Categories</a></li>
                <li id="menu-profile"><a href="profile.html">Profile</a></li>
                <li id="menu-logout"><a href="../index.html">Logout</a></li>
            </ul>
        </nav>

    </aside>

    <main id="main-content">

        <div id="profile-page">

            <header id="profile-header">
                <h1 id="profile-title">Admin Profile</h1>
                <p id="profile-description">View and update your profile information.</p>
            </header>

            <section id="profile-picture-section">
                <img id="profile-image" src="../images/admin.png" alt="Admin Profile">
                <input type="file" id="upload-profile-image" accept="image/*">
            </section>

            <section id="profile-information">
                <form id="profile-form">
                    <label for="admin-name">Full Name</label>
                    <input type="text" id="admin-name" name="adminName" placeholder="Enter Full Name">

                    <label for="admin-email">Email</label>
                    <input type="email" id="admin-email" name="adminEmail" placeholder="Enter Email">

                    <label for="admin-phone">Phone Number</label>
                    <input type="tel" id="admin-phone" name="adminPhone" placeholder="Enter Phone Number">

                    <button type="submit" id="update-profile-btn">Update Profile</button>
                </form>
            </section>

            <section id="password-section">
                <h2 id="password-title">Change Password</h2>
                <form id="password-form">
                    <label for="current-password">Current Password</label>
                    <input type="password" id="current-password" name="currentPassword">

                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" name="newPassword">

                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirmPassword">

                    <button type="submit" id="change-password-btn">Change Password</button>
                </form>
            </section>

            <section id="logout-section">
                <a href="../index.html" style="text-decoration: none;">
                    <button id="logout-btn">Logout</button>
                </a>
            </section>

        </div>

    </main>

</div>

</body>
</html>
